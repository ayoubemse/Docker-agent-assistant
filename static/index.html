<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Docker Agent</title>
  <style>
    /* ── Tokens ─────────────────────────────────────────── */
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface-2:   #21262d;
      --border:      #30363d;
      --blue:        #2188ff;
      --blue-dim:    #1158a7;
      --green:       #3fb950;
      --red:         #f85149;
      --yellow:      #d29922;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --font-mono:   'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-ui:     -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius:      6px;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .whale {
      font-size: 22px;
      line-height: 1;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-left: auto;
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Chat area ───────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Message rows ────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 12px;
      padding: 6px 0;
      max-width: 100%;
      animation: fadein 0.15s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { flex-direction: row-reverse; }
    .msg.agent { flex-direction: row; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: var(--radius);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user  .avatar { background: var(--blue-dim); }
    .msg.agent .avatar { background: var(--surface-2); border: 1px solid var(--border); }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 13.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user  .bubble {
      background: var(--blue-dim);
      color: #fff;
      border-bottom-right-radius: 2px;
    }

    .msg.agent .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 2px;
    }

    /* ── Inline code inside bubbles ─────────────────────── */
    .bubble code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--blue);
    }

    /* ── Typing indicator ────────────────────────────────── */
    .typing .bubble {
      padding: 12px 16px;
    }

    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
      height: 16px;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40%           { transform: scale(1.2); opacity: 1; }
    }

    /* ── Suggestions ─────────────────────────────────────── */
    #suggestions {
      display: flex;
      gap: 8px;
      padding: 0 20px 12px;
      flex-wrap: wrap;
    }

    .chip {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    /* ── Input bar ───────────────────────────────────────── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13.5px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #input::placeholder { color: var(--text-muted); }
    #input:focus { border-color: var(--blue); }

    #send {
      background: var(--blue);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send:hover   { background: #1a7ae8; }
    #send:active  { transform: scale(0.95); }
    #send:disabled { background: var(--surface-2); cursor: not-allowed; }

    /* ── Error toast ─────────────────────────────────────── */
    .error-bubble {
      background: #2d1216 !important;
      border-color: var(--red) !important;
      color: var(--red) !important;
    }
  </style>
</head>
<body>

  <header>
    <span class="whale">🐳</span>
    <h1>Docker Agent</h1>
    <span class="tag">claude-sonnet-4-6</span>
    <div class="status-dot" title="Connected"></div>
  </header>

  <div id="chat"></div>

  <div id="suggestions">
    <div class="chip" onclick="quickSend(this)">list containers</div>
    <div class="chip" onclick="quickSend(this)">show memory usage</div>
    <div class="chip" onclick="quickSend(this)">which container uses most CPU?</div>
    <div class="chip" onclick="quickSend(this)">what does OOMKilled mean?</div>
  </div>

  <footer>
    <textarea id="input" placeholder="Ask about your containers…" rows="1"></textarea>
    <button id="send" onclick="send()" title="Send (Enter)">&#10148;</button>
  </footer>

  <script>
    const API = 'http://localhost:8000/chat'
    const threadId = 'ui-' + Math.random().toString(36).slice(2, 9)
    const chat = document.getElementById('chat')
    const input = document.getElementById('input')
    const sendBtn = document.getElementById('send')
    const suggestions = document.getElementById('suggestions')

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto'
      input.style.height = Math.min(input.scrollHeight, 120) + 'px'
    })

    // Send on Enter (Shift+Enter = newline)
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        send()
      }
    })

    function quickSend(chip) {
      input.value = chip.textContent
      send()
    }

    function appendMsg(role, content, extra = '') {
      const row = document.createElement('div')
      row.className = `msg ${role} ${extra}`

      const avatar = document.createElement('div')
      avatar.className = 'avatar'
      avatar.textContent = role === 'user' ? '👤' : '🐳'

      const bubble = document.createElement('div')
      bubble.className = 'bubble' + (extra === 'error' ? ' error-bubble' : '')
      bubble.textContent = content

      row.appendChild(avatar)
      row.appendChild(bubble)
      chat.appendChild(row)
      chat.scrollTop = chat.scrollHeight
      return bubble
    }

    function showTyping() {
      const row = document.createElement('div')
      row.className = 'msg agent typing'
      row.id = 'typing'

      const avatar = document.createElement('div')
      avatar.className = 'avatar'
      avatar.textContent = '🐳'

      const bubble = document.createElement('div')
      bubble.className = 'bubble'
      bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>'

      row.appendChild(avatar)
      row.appendChild(bubble)
      chat.appendChild(row)
      chat.scrollTop = chat.scrollHeight
    }

    function removeTyping() {
      const el = document.getElementById('typing')
      if (el) el.remove()
    }

    async function send() {
      const text = input.value.trim()
      if (!text) return

      // Hide suggestions after first message
      suggestions.style.display = 'none'

      appendMsg('user', text)
      input.value = ''
      input.style.height = 'auto'
      sendBtn.disabled = true
      showTyping()

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command: text, thread_id: threadId })
        })

        removeTyping()

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }))
          appendMsg('agent', '⚠ ' + (err.detail || 'Server error'), 'error')
          return
        }

        const data = await res.json()
        appendMsg('agent', data.output)

      } catch (err) {
        removeTyping()
        appendMsg('agent', '⚠ Could not reach the agent. Is it running on port 8000?', 'error')
      } finally {
        sendBtn.disabled = false
        input.focus()
      }
    }

    // Welcome message
    window.addEventListener('load', () => {
      appendMsg('agent', 'Hello! I can list, inspect, restart, and kill your Docker containers — and answer Docker questions from your documentation. What would you like to do?')
    })
  </script>

</body>
</html>
